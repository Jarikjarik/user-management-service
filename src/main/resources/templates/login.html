<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login page</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
        }

        body {
            display: flex;
            align-items: flex-start;
            padding-top: 16px;
            padding-bottom: 40px;
            background-color: #f5f5f5;
        }

        .form-signin {
            width: 100%;
            max-width: 330px;
            padding: 15px;
            margin-left: auto;
            margin-right: auto;
            margin-top: 16px
        }

        .form-signin .form-control {
            height: 46px;
        }
    </style>
</head>
<body>
<main class="form-signin">
    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <h3 class="h3 mb-3 fw-bold">Please sign in</h3>

        <div class="form-floating">
            <input type="text" class="form-control" id="username" name="username" placeholder="Email address" required
                   autofocus>
            <label for="username">Email address</label>
        </div>
        <div class="form-floating mt-2">
            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
            <label for="password">Password</label>
        </div>

        <button class="w-100 btn btn-lg btn-primary mt-3" type="submit">Sign in</button>

        <div th:if="${param.error}" class="alert alert-danger mt-3 mb-0" role="alert">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success mt-3 mb-0" role="alert">
            You have been logged out.
        </div>
    </form>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
