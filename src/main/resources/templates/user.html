<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>User page</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <div class="text-white">
            <b sec:authentication="name">user@mail.ru</b>
            <span> with roles: </span>
            <span th:each="r, st : ${user.rolesSorted}"
                  th:text="${r.name.replace('ROLE_', '') + (st.last ? '' : ' ')}"></span>
        </div>

        <form th:action="@{/logout}" method="post" class="mb-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-link text-secondary text-decoration-none">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <nav class="col-2 bg-white border-end min-vh-100 p-0">
            <div class="nav flex-column nav-pills">
                <a class="nav-link active rounded-0" th:href="@{/user}">User</a>
            </div>
        </nav>

        <main class="col-10 p-4">
            <h1 class="display-6 mb-3">User information-page</h1>

            <div class="card">
                <div class="card-header fw-bold">About user</div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-striped mb-0 align-middle">
                            <thead>
                            <tr>
                                <th class="ps-3">ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Age</th>
                                <th>Email</th>
                                <th>Role</th>
                            </tr>
                            </thead>
                            <tbody id="meTbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/user.js"></script>
</body>
</html>
