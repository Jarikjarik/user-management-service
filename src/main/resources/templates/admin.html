<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Admin panel</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Top navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <div class="text-white">
            <b sec:authentication="name">admin@mail.ru</b>
            <span> with roles: </span>
            <span th:each="r, it : ${#authentication.principal.rolesSorted}"
                  th:text="${r.name.replace('ROLE_', '') + (it.last ? '' : ' ')}"></span>
        </div>

        <form th:action="@{/logout}" method="post" class="mb-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-link text-secondary text-decoration-none">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- Left sidebar -->
        <nav class="col-2 bg-white border-end min-vh-100 p-0">
            <div class="nav flex-column nav-pills">
                <a class="nav-link active rounded-0" th:href="@{/admin}">Admin</a>
                <a class="nav-link rounded-0" th:href="@{/user}">User</a>
            </div>
        </nav>

        <!-- Main content -->
        <main class="col-10 p-4">
            <h1 class="display-6 mb-3 fw-bold">Admin panel</h1>

            <ul class="nav nav-tabs" id="adminTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="users-tab" data-bs-toggle="tab" data-bs-target="#users"
                            type="button" role="tab" aria-controls="users" aria-selected="true">
                        Users table
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="newuser-tab" data-bs-toggle="tab" data-bs-target="#newuser"
                            type="button" role="tab" aria-controls="newuser" aria-selected="false">
                        New User
                    </button>
                </li>
            </ul>

            <div class="tab-content bg-white border border-top-0 p-3" id="adminTabsContent">

                <!-- Users table tab -->
                <div class="tab-pane fade show active" id="users" role="tabpanel" aria-labelledby="users-tab">
                    <div class="card">
                        <div class="card-header fw-bold">All users</div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-striped mb-0 align-middle">
                                    <thead>
                                    <tr>
                                        <th class="ps-3">ID</th>
                                        <th>First Name</th>
                                        <th>Last Name</th>
                                        <th>Age</th>
                                        <th>Email</th>
                                        <th>Role</th>
                                        <th class="text-center">Edit</th>
                                        <th class="text-center">Delete</th>
                                    </tr>
                                    </thead>
                                    <tbody id="usersTbody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Edit modal -->
                    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <form id="editForm">
                                    <div class="modal-header">
                                        <h5 class="modal-title">Edit user</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"
                                                aria-label="Close"></button>
                                    </div>

                                    <div class="modal-body">
                                        <div class="text-center">
                                            <input type="hidden" id="editId">

                                            <label class="form-label fw-bold mb-1">First name</label>
                                            <input class="form-control form-control-sm text-center mb-2"
                                                   style="max-width:240px;margin:0 auto;"
                                                   id="editName" required>

                                            <label class="form-label fw-bold mb-1">Last name</label>
                                            <input class="form-control form-control-sm text-center mb-2"
                                                   style="max-width:240px;margin:0 auto;"
                                                   id="editLastName" required>

                                            <label class="form-label fw-bold mb-1">Age</label>
                                            <input class="form-control form-control-sm text-center mb-2"
                                                   style="max-width:240px;margin:0 auto;"
                                                   type="number" min="0" id="editAge" required>

                                            <label class="form-label fw-bold mb-1">Email</label>
                                            <input class="form-control form-control-sm text-center mb-2"
                                                   style="max-width:240px;margin:0 auto;"
                                                   type="email" id="editEmail" required>

                                            <label class="form-label fw-bold mb-1">Username</label>
                                            <input class="form-control form-control-sm text-center mb-2"
                                                   style="max-width:240px;margin:0 auto;"
                                                   id="editUsername">

                                            <label class="form-label fw-bold mb-1">Password</label>
                                            <input class="form-control form-control-sm text-center mb-2"
                                                   style="max-width:240px;margin:0 auto;"
                                                   type="password" id="editPassword"
                                                   placeholder="Leave blank to keep current password">

                                            <label class="form-label fw-bold mb-1">Role</label>
                                            <select class="form-select form-select-sm mb-2"
                                                    style="max-width:240px;margin:0 auto;"
                                                    id="editRoles" multiple size="2" required></select>
                                        </div>
                                    </div>

                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close
                                        </button>
                                        <button type="submit" class="btn btn-primary">Edit</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- Delete modal -->
                    <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <form id="deleteForm">
                                    <div class="modal-header">
                                        <h5 class="modal-title">Delete user</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"
                                                aria-label="Close"></button>
                                    </div>

                                    <div class="modal-body text-center">
                                        <input type="hidden" id="deleteId">
                                        <p class="mb-0">Are you sure you want to delete <b id="deleteLabel"></b>?</p>
                                    </div>

                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close
                                        </button>
                                        <button type="submit" class="btn btn-danger">Delete</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- New user tab -->
                <div class="tab-pane fade" id="newuser" role="tabpanel" aria-labelledby="newuser-tab">
                    <div class="card">
                        <div class="card-header fw-bold">Add new user</div>
                        <div class="card-body">
                            <form id="newUserForm">
                                <div class="text-center">

                                    <label class="form-label fw-bold mb-1">First name</label>
                                    <input id="newName" class="form-control form-control-sm text-center mb-2"
                                           style="max-width: 240px; margin: 0 auto;" required>

                                    <label class="form-label fw-bold mb-1">Last name</label>
                                    <input id="newLastName" class="form-control form-control-sm text-center mb-2"
                                           style="max-width: 240px; margin: 0 auto;" required>

                                    <label class="form-label fw-bold mb-1">Age</label>
                                    <input id="newAge" class="form-control form-control-sm text-center mb-2"
                                           style="max-width: 240px; margin: 0 auto;" type="number" min="0" required>

                                    <label class="form-label fw-bold mb-1">Email</label>
                                    <input id="newEmail" class="form-control form-control-sm text-center mb-2"
                                           style="max-width: 240px; margin: 0 auto;" type="email" required>

                                    <label class="form-label fw-bold mb-1">Username</label>
                                    <input id="newUsername" class="form-control form-control-sm text-center mb-2"
                                           style="max-width: 240px; margin: 0 auto;">

                                    <label class="form-label fw-bold mb-1">Password</label>
                                    <input id="newPassword" class="form-control form-control-sm text-center mb-2"
                                           style="max-width: 240px; margin: 0 auto;" type="password" required>

                                    <label class="form-label fw-bold mb-1">Role</label>
                                    <select id="newRoles" class="form-select form-select-sm mb-3"
                                            style="max-width: 240px; margin: 0 auto;"
                                            multiple size="2" required>
                                    </select>

                                    <button type="submit" class="btn btn-success">Add new user</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
